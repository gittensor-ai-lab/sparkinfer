# Gemma 4 26B-A4B architecture specification
# Source: https://huggingface.co/google/gemma-4-27b-it/blob/main/config.json

model:
  name: Gemma4-26B-A4B
  family: gemma4
  total_params_b: 26
  active_params_b: 4

# --- Attention (interleaved local + global) ---
attention:
  num_hidden_layers: 30
  hidden_size: 2112
  vocab_size: 262144
  max_position_embeddings: 262144   # 256K context

  # Interleaved pattern: 5 local layers then 1 global, repeated x5
  # Layer indices 0-4: local, 5: global, 6-10: local, 11: global, ...
  attention_pattern: "5L1G"         # 25 local + 5 global = 30 total
  num_local_layers: 25
  num_global_layers: 5

  local:
    num_attention_heads: 16
    num_key_value_heads: 8          # GQA 2:1
    head_dim: 256                   # non-standard — most kernels only support ≤128
    sliding_window: 1024            # KV cache CAPPED at 1024 tokens per local layer
    rope_theta: 10000

  global:
    num_attention_heads: 16
    num_key_value_heads: 2          # GQA 8:1
    head_dim: 512                   # no existing open-source kernel handles this
    sliding_window: null            # full context
    rope_theta: 1000000

moe:
  num_experts: 128
  num_experts_per_tok: 8
  shared_expert: true               # 1 always-active shared expert
  total_routed_per_tok: 9           # 8 selected + 1 shared
  moe_intermediate_size: 704        # expert FFN width (2112→704→2112)

# --- Derived optimization-relevant values ---
derived:
  # LOCAL KV per token (bf16): 25 layers × 8 KV heads × 256 dim × 2 (K+V) × 2 bytes
  local_kv_bytes_per_token: 204800  # ~200 KB/token
  # But local KV is CAPPED at window=1024: max local KV = 1024 × 200KB = 200 MB (fixed)
  local_kv_max_bytes: 209715200

  # GLOBAL KV per token (bf16): 5 layers × 2 KV heads × 512 dim × 2 (K+V) × 2 bytes
  global_kv_bytes_per_token: 20480  # ~20 KB/token
  # At 256K context: 5 × 2 × 512 × 2 × 2 × 262144 = 5.37 GB
  global_kv_bytes_at_max_ctx_gb: 5.4

  # Expert GEMM shape (up projection): [2112, 704] — less skinny than Qwen3.5
  expert_up_shape: [2112, 704]
  expert_down_shape: [704, 2112]

  # Kernel gaps in the ecosystem:
  # head_dim=256 (local): FlashInfer supports, but needs sw_attn variant
  # head_dim=512 (global): NO existing open-source FlashAttention kernel supports this
  kernel_gaps:
    - local_sliding_window_hd256    # exists in some libs but sw_attn + GQA combo is rare
    - global_full_context_hd512     # no public implementation — SN74 opportunity

quantization:
  q4_k_m:
    bits_per_param: 4.8
    estimated_size_gb: 14.6
    fits_on:
      - RTX 5090   # 32GB: model(14.6) + KV(5.6) = 20.2 GB — 11.8 GB headroom
      - RTX Spark  # 128GB — trivial
      - RTX 4090   # 24GB — 14.6 + 5.6 = 20.2 GB, fits comfortably
